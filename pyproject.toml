[project]
name = "wesen"
version = "0.1.0"
description = "Völkels jagt"
requires-python = ">=3.8"
dependencies = [
    "numpy",
    "PyOpenGL",
    "Pillow",
]

[project.scripts]
wesen = "Wesen.loader:Loader"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
